name: Release Mufy Editor Helper v0.4.1

on:
  push:
    branches:
      - master
    paths:
      - '.github/release-v041.trigger'

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          persist-credentials: true

      - name: Apply v0.4.1 hotfix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('plugintempermonkey.js')
          source = path.read_text(encoding='utf-8')

          def replace_once(old, new, label):
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              source = source.replace(old, new, 1)

          replace_once(
              '// @version      0.4.0\n'
              '// @description  扫描、分组、导出、预览并安全写回 Mufy 角色卡编辑字段；含全屏工作台 + 草稿层 + Token 计数',
              '// @version      0.4.1\n'
              '// @description  扫描、分组、导出、预览并安全写回 Mufy 角色卡编辑字段；含全屏工作台、草稿保护与 Token 预算',
              'metadata'
          )

          replace_once(
              '  /*\n'
              '    V0.4.0 新增：草稿层 + Token 计数（步骤 2）',
              '  /*\n'
              '    V0.4.1 修复：草稿导出、退出保护与 Token 统计性能\n'
              '    - “人设”纳入关键字段 Token 合计。\n'
              '    - 复制给 LLM 改为导出当前草稿，不再回退到进入工作台时的旧原文。\n'
              '    - 退出工作台前检测未写入 Mufy 的草稿，避免误退出丢失内容。\n'
              '    - Token 面板改为 300ms 防抖更新，降低超长字段编辑卡顿。\n\n'
              '    V0.4.0 新增：草稿层 + Token 计数（步骤 2）',
              'version notes'
          )

          replace_once(
              "var TRACKED_KEYWORDS = ['角色设定', '开场设计', '输出设定', '情节设定', '样例对话', '文风'];",
              "var TRACKED_KEYWORDS = ['人设', '角色设定', '开场设计', '输出设定', '情节设定', '样例对话', '文风'];",
              'tracked keywords'
          )

          replace_once(
              '  var wbSnapshot = [];',
              '  var wbSnapshot = [];\n'
              '  // 右侧 Token 面板防抖计时器，避免超长字段每次按键都全量重算。\n'
              '  var wbTokenTimer = null;',
              'workbench timer'
          )

          replace_once(
              '    /* 复制给 LLM：使用原文快照内容（originalContent），方便发给 LLM 改写 */',
              '    /* 复制给 LLM：导出当前草稿（draftContent），保留本次工作台的最新编辑。 */',
              'copy comment'
          )

          replace_once(
              "return '## ' + snap.label + '\\n\\n' + snap.originalContent + '\\n';",
              "return '## ' + snap.label + '\\n\\n' + snap.draftContent + '\\n';",
              'copy current drafts'
          )

          replace_once(
              "toast(ok ? '已复制工作台字段（原文），可粘贴给 LLM' : '复制失败，请手动选择文本');",
              "toast(ok ? '已复制工作台字段（当前草稿），可粘贴给 LLM' : '复制失败，请手动选择文本');",
              'copy toast'
          )

          replace_once(
              "  function closeWorkbench() {\n"
              "    wbEl.classList.remove('open');\n"
              "    wbCurrentIndex = -1;\n"
              "    wbSnapshot = [];\n"
              "  }",
              "  function hasDirtyWbDrafts() {\n"
              "    return wbSnapshot.some(function (snap) {\n"
              "      return snap.draftContent !== snap.originalContent;\n"
              "    });\n"
              "  }\n\n"
              "  function clearWbTokenTimer() {\n"
              "    if (!wbTokenTimer) return;\n"
              "    window.clearTimeout(wbTokenTimer);\n"
              "    wbTokenTimer = null;\n"
              "  }\n\n"
              "  function scheduleWbRightPanelUpdate() {\n"
              "    clearWbTokenTimer();\n"
              "    wbTokenTimer = window.setTimeout(function () {\n"
              "      wbTokenTimer = null;\n"
              "      if (wbEl && wbEl.classList.contains('open') && wbCurrentIndex >= 0) {\n"
              "        updateWbRightPanel();\n"
              "      }\n"
              "    }, 300);\n"
              "  }\n\n"
              "  function closeWorkbench() {\n"
              "    if (hasDirtyWbDrafts()) {\n"
              "      var confirmed = window.confirm('当前有未写入 Mufy 的草稿。退出后将丢失，确定退出吗？');\n"
              "      if (!confirmed) return;\n"
              "    }\n\n"
              "    clearWbTokenTimer();\n"
              "    wbEl.classList.remove('open');\n"
              "    wbCurrentIndex = -1;\n"
              "    wbSnapshot = [];\n"
              "  }",
              'workbench close protection'
          )

          replace_once(
              "  function selectWbField(index) {\n"
              "    if (index < 0 || index >= wbSnapshot.length) return;\n\n"
              "    var editor = wbEl.querySelector('#mufy-wb-editor');",
              "  function selectWbField(index) {\n"
              "    if (index < 0 || index >= wbSnapshot.length) return;\n\n"
              "    clearWbTokenTimer();\n"
              "    var editor = wbEl.querySelector('#mufy-wb-editor');",
              'field switch timer cleanup'
          )

          replace_once(
              "      updateWbRightPanel();\n"
              "    });\n"
              "  }\n\n"
              "  function openWorkbench()",
              "      scheduleWbRightPanelUpdate();\n"
              "    });\n"
              "  }\n\n"
              "  function openWorkbench()",
              'debounced editor input'
          )

          replace_once(
              "      '    <div class=\"wb-section-title\">关键字段合计</div>',",
              "      '    <div class=\"wb-section-title\">本次已选关键字段合计</div>',",
              'tracked total label'
          )

          path.write_text(source, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          entry = '''# 更新日志\n\n## v0.4.1 — 2026-06-21\n\n### 修复\n- 将 Mufy 实际字段名“人设”纳入关键字段 Token 合计，避免预算低估。\n- “复制给 LLM”现在导出工作台中的最新草稿，而不是进入工作台时的旧原文。\n- 退出工作台前会检测未写入 Mufy 的草稿；确认退出才会清空本次草稿。\n- Token 统计改为 300ms 防抖刷新，降低超长字段（尤其小剧场）编辑时的卡顿。\n- 右侧统计标题明确为“本次已选关键字段合计”，避免误认为是整张卡的全量 Token。\n\n### 边界\n- 本版本仍只维护草稿层，不自动写回 Mufy，不自动点击“更新角色”。\n- Token 为本地近似估算；资料库若启用，仍需额外预留约 5000 Token。\n\n'''
          if changelog.exists():
              old = changelog.read_text(encoding='utf-8')
              if '## v0.4.1' not in old:
                  changelog.write_text(entry + old.lstrip(), encoding='utf-8')
          else:
              changelog.write_text(entry, encoding='utf-8')
          PY

      - name: Commit release and remove temporary workflow
        run: |
          rm -f .github/release-v041.trigger .github/workflows/release-v041.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "release: Mufy 角色卡编辑助手 v0.4.1"
          git push origin HEAD:master
