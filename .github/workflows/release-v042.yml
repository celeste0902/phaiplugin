name: Release Mufy Editor Helper v0.4.2

on:
  push:
    branches:
      - master
    paths:
      - '.github/release-v042.trigger'

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          persist-credentials: true

      - name: Apply strict Mufy token scope
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('plugintempermonkey.js')
          source = path.read_text(encoding='utf-8')

          def replace_once(old, new, label):
              global source
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              source = source.replace(old, new, 1)

          replace_once(
              '// @version      0.4.1\n'
              '// @description  扫描、分组、导出、预览并安全写回 Mufy 角色卡编辑字段；含全屏工作台、草稿保护与 Token 预算',
              '// @version      0.4.2\n'
              '// @description  扫描、分组、导出、预览并安全写回 Mufy 角色卡编辑字段；含全屏工作台、草稿保护与严格 Token 预算',
              'metadata'
          )

          marker = (
              '  /*\n'
              '    V0.4.1 修复：草稿导出、退出保护与 Token 统计性能'
          )
          replacement = (
              '  /*\n'
              '    V0.4.2 修复：严格限定 Mufy 核心字段 Token 统计\n'
              '    - 只统计：人设、开场设计、输出设定、情节设定、样例对话&文风。\n'
              '    - 移除“角色设定”等兼容关键词，不再因模糊匹配把其他字段算进总量。\n'
              '    - 不论是否被勾选进入工作台，已扫描的五个核心字段都会参与总量；工作台字段优先使用草稿。\n'
              '    - 资料库不自动加入总数；若卡内含资料库，由用户自行额外预留约 5000 Token。\n\n'
              '    V0.4.1 修复：草稿导出、退出保护与 Token 统计性能'
          )
          replace_once(marker, replacement, 'version notes')

          replace_once(
              "  /* ─── 关键字段关键词（用于 Token 合计统计） ─── */\n"
              "  var TRACKED_KEYWORDS = ['人设', '角色设定', '开场设计', '输出设定', '情节设定', '样例对话', '文风'];",
              "  /* ─── Mufy 核心字段（Token 合计只统计这五项） ─── */\n"
              "  var TRACKED_FIELD_LABELS = ['人设', '开场设计', '输出设定', '情节设定', '样例对话&文风'];",
              'tracked field whitelist'
          )

          replace_once(
              "  function isTrackedLabel(label) {\n"
              "    return TRACKED_KEYWORDS.some(function (kw) {\n"
              "      return label.indexOf(kw) !== -1;\n"
              "    });\n"
              "  }",
              "  function normalizeTrackedLabel(label) {\n"
              "    return compactText(label).replace(/[＆﹠]/g, '&');\n"
              "  }\n\n"
              "  function isTrackedLabel(label) {\n"
              "    var normalized = normalizeTrackedLabel(label);\n"
              "    return TRACKED_FIELD_LABELS.some(function (expected) {\n"
              "      return normalized === normalizeTrackedLabel(expected);\n"
              "    });\n"
              "  }\n\n"
              "  function getTrackedFieldByLabel(expectedLabel) {\n"
              "    var expected = normalizeTrackedLabel(expectedLabel);\n"
              "    for (var i = 0; i < fields.length; i += 1) {\n"
              "      var field = fields[i];\n"
              "      if (normalizeTrackedLabel(field.label) === expected || normalizeTrackedLabel(field.rawLabel) === expected) {\n"
              "        return field;\n"
              "      }\n"
              "    }\n"
              "    return null;\n"
              "  }\n\n"
              "  function getWbSnapshotByFieldId(fieldId) {\n"
              "    for (var i = 0; i < wbSnapshot.length; i += 1) {\n"
              "      if (wbSnapshot[i].fieldId === fieldId) return wbSnapshot[i];\n"
              "    }\n"
              "    return null;\n"
              "  }\n\n"
              "  function getTrackedFieldContent(field) {\n"
              "    var snap = getWbSnapshotByFieldId(field.id);\n"
              "    if (snap) return snap.draftContent;\n"
              "    if (!field.el || !field.el.isConnected) return null;\n"
              "    return getValue(field.el);\n"
              "  }",
              'strict token helpers'
          )

          replace_once(
              "      return {\n"
              "        label: field.label,\n"
              "        originalContent: content,\n"
              "        draftContent: content\n"
              "      };",
              "      return {\n"
              "        fieldId: field.id,\n"
              "        label: field.label,\n"
              "        originalContent: content,\n"
              "        draftContent: content\n"
              "      };",
              'workbench snapshot field id'
          )

          replace_once(
              "      '    <div class=\"wb-section-title\">本次已选关键字段合计</div>',\n"
              "      '    <div id=\"mufy-wb-tracked-list\"></div>',",
              "      '    <div class=\"wb-section-title\">Mufy 核心字段 Token（5项）</div>',\n"
              "      '    <div id=\"mufy-wb-tracked-list\"></div>',\n"
              "      '    <div id=\"mufy-wb-tracked-status\" class=\"wb-tracked-status\"></div>',",
              'tracked UI heading'
          )

          replace_once(
              "      '      ⚠️ 若启用资料库，额外占用约 5000 Token，请自行计入上限。',",
              "      '      ⚠️ 若此卡包含资料库，请手动额外预留约 5000 Token；本计数不自动加入。',",
              'library note'
          )

          old_block = '''    // 关键字段合计：遍历快照，找到标签匹配关键词的字段
    var trackedListEl = wbEl.querySelector('#mufy-wb-tracked-list');
    trackedListEl.innerHTML = '';
    var total = 0;

    wbSnapshot.forEach(function (s, idx) {
      if (!isTrackedLabel(s.label)) return;
      // 当前正在编辑的字段用编辑器实时值，其余用各自的 draftContent
      var content = (idx === wbCurrentIndex)
        ? editor.value
        : s.draftContent;
      var t = estimateTokens(content);
      total += t;

      var row = document.createElement('div');
      row.className = 'wb-info-row wb-tracked-row';
      row.innerHTML =
        '<span class="wb-info-key wb-tracked-label" title="' + escapeHtml(s.label) + '">' +
        escapeHtml(s.label) + '</span>' +
        '<span class="wb-info-val">' + t + '</span>';
      trackedListEl.appendChild(row);
    });

    wbEl.querySelector('#mufy-wb-total-token').textContent = total + ' / ' + TOKEN_LIMIT + ' token';'''

          new_block = '''    // Mufy 核心字段 Token：只统计五个固定字段。
    // 已进入工作台的字段使用草稿；未勾选但已扫描的字段读取 Mufy 当前内容。
    var trackedListEl = wbEl.querySelector('#mufy-wb-tracked-list');
    var trackedStatusEl = wbEl.querySelector('#mufy-wb-tracked-status');
    trackedListEl.innerHTML = '';
    var total = 0;
    var missingLabels = [];

    TRACKED_FIELD_LABELS.forEach(function (label) {
      var field = getTrackedFieldByLabel(label);
      var content = field ? getTrackedFieldContent(field) : null;
      var tokens = 0;

      if (content === null) {
        missingLabels.push(label);
      } else {
        tokens = estimateTokens(content);
        total += tokens;
      }

      var row = document.createElement('div');
      row.className = 'wb-info-row wb-tracked-row';
      row.innerHTML =
        '<span class="wb-info-key wb-tracked-label" title="' + escapeHtml(label) + '">' +
        escapeHtml(label) + '</span>' +
        '<span class="wb-info-val">' + (content === null ? '未扫描' : tokens) + '</span>';
      trackedListEl.appendChild(row);
    });

    if (missingLabels.length) {
      trackedStatusEl.textContent = '缺少 ' + missingLabels.length + ' 项：请展开对应区块后重新扫描';
      trackedStatusEl.style.color = '#fbbf24';
    } else {
      trackedStatusEl.textContent = '已覆盖全部 5 项；资料库不自动计入';
      trackedStatusEl.style.color = '#6b6b8a';
    }

    wbEl.querySelector('#mufy-wb-total-token').textContent = total + ' / ' + TOKEN_LIMIT + ' token';'''
          replace_once(old_block, new_block, 'strict tracked total block')

          replace_once(
              "      '.wb-tracked-label{display:block;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}',",
              "      '.wb-tracked-label{display:block;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}',\n"
              "      '.wb-tracked-status{font-size:10px;line-height:1.5;margin-top:2px}',",
              'tracked status style'
          )

          path.write_text(source, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          entry = '''## v0.4.2 — 2026-06-21

### 修复
- Token 合计改为严格白名单：仅统计“人设、开场设计、输出设定、情节设定、样例对话&文风”五项。
- 移除“角色设定”等额外兼容关键词，避免模糊匹配把其他字段错误计入。
- 五项核心字段中，进入工作台的内容使用当前草稿；未勾选但已扫描的核心字段仍会使用 Mufy 当前内容参与总量。
- 未扫描到的核心字段会明确显示“未扫描”，提示展开对应区块并重新扫描，避免静默低估。
- 资料库提示改为：若用户确认卡内包含资料库，需自行额外预留约 5000 Token；插件不自动加到总数。

'''
          if changelog.exists():
              old = changelog.read_text(encoding='utf-8')
              if '## v0.4.2' not in old:
                  changelog.write_text('# 更新日志\n\n' + entry + old.replace('# 更新日志\n\n', '', 1).lstrip(), encoding='utf-8')
          else:
              changelog.write_text('# 更新日志\n\n' + entry, encoding='utf-8')
          PY

      - name: Commit release and remove temporary workflow
        run: |
          rm -f .github/release-v042.trigger .github/workflows/release-v042.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "release: Mufy 角色卡编辑助手 v0.4.2"
          git push origin HEAD:master
